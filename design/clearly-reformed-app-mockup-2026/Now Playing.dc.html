<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Flecha';src:url('assets/fonts/FlechaM-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Flecha';src:url('assets/fonts/FlechaM-Bold.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:'FlechaText';src:url('assets/fonts/FlechaS-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}
*{box-sizing:border-box}
html,body{margin:0}
*::-webkit-scrollbar{width:0;height:0;display:none}
*{scrollbar-width:none}
</style>
</helmet>

<div style="min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:#E6E1D4;padding:36px 20px;font-family:'IBM Plex Sans',sans-serif">
<div style="position:relative;width:390px;height:844px;border-radius:42px;overflow:hidden;box-shadow:0 40px 80px -24px rgba(40,34,22,.5),0 0 0 1px rgba(40,34,22,.06);display:flex;flex-direction:column;background:#1E2620;background-image:radial-gradient(120% 60% at 50% 8%,#33403709 0%,transparent 55%),linear-gradient(180deg,#2A352E 0%,#202821 46%,#1A211C 100%);color:#F1EBDD">

  <!-- status bar -->
  <div style="flex:none;height:48px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 30px 8px;color:#F1EBDD">
    <span style="font-weight:600;font-size:15px;letter-spacing:.01em">9:41</span>
    <div style="display:flex;align-items:center;gap:7px">
      <svg width="18" height="11" viewBox="0 0 18 11" fill="currentColor"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="5" y="4.5" width="3" height="6.5" rx="1"/><rect x="10" y="2" width="3" height="9" rx="1"/><rect x="15" y="0" width="3" height="11" rx="1"/></svg>
      <svg width="16" height="11" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 4.2C4.8 1 11.2 1 15 4.2"/><path d="M3.4 6.6C5.9 4.5 10.1 4.5 12.6 6.6"/><path d="M5.8 9C7.1 8 8.9 8 10.2 9"/><circle cx="8" cy="10.6" r="0.5" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.45"/><rect x="2" y="2" width="16" height="8" rx="1.5" fill="currentColor"/><rect x="23" y="4" width="1.6" height="4" rx="0.8" fill="currentColor" opacity="0.5"/></svg>
    </div>
  </div>

  <!-- header -->
  <div style="flex:none;display:flex;align-items:center;justify-content:space-between;padding:6px 20px 0">
    <div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(241,235,221,.08);cursor:pointer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D8DAD0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div style="text-align:center">
      <div style="font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:#8E9A8C">Playing from Podcast</div>
      <div style="font-size:12.5px;font-weight:600;color:#D8DAD0;margin-top:2px">Life and Books and Everything</div>
    </div>
    <div style="width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(241,235,221,.08);cursor:pointer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#D8DAD0"><circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/></svg>
    </div>
  </div>

  <!-- artwork -->
  <div style="flex:none;padding:26px 30px 0;display:flex;justify-content:center">
    <div style="position:relative;width:100%;border-radius:22px;overflow:hidden;box-shadow:0 30px 50px -18px rgba(0,0,0,.6),0 0 0 1px rgba(241,235,221,.06)">
      <img src="assets/img/special-guest.jpg" alt="" style="display:block;width:100%;height:286px;object-fit:cover">
    </div>
  </div>

  <!-- meta -->
  <div style="flex:none;padding:24px 28px 0">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:14px">
      <div style="min-width:0">
        <div style="font-size:10.5px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:#C8941F">Episode 142 · May 28</div>
        <h1 style="font-family:'Flecha',serif;font-weight:700;font-size:23px;line-height:1.14;color:#F4EFE2;margin:9px 0 0">The Most Special Guest Ever with Trisha DeYoung</h1>
      </div>
      <div onClick="{{ toggleLike }}" style="width:40px;height:40px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;background:rgba(241,235,221,.08);cursor:pointer;margin-top:4px">
        <sc-if value="{{ liked }}" hint-placeholder-val="{{ false }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="#C8941F"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.4 1.7 4.5 5.3 4.5c2.1 0 3.4 1.3 4.7 3 1.3-1.7 2.6-3 4.7-3 3.6 0 4.9 3.9 3.3 7.2C19.5 16.4 12 21 12 21z"/></svg></sc-if>
        <sc-if value="{{ notLiked }}" hint-placeholder-val="{{ true }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D8DAD0" stroke-width="1.7"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.4 1.7 4.5 5.3 4.5c2.1 0 3.4 1.3 4.7 3 1.3-1.7 2.6-3 4.7-3 3.6 0 4.9 3.9 3.3 7.2C19.5 16.4 12 21 12 21z"/></svg></sc-if>
      </div>
    </div>
  </div>

  <!-- scrubber -->
  <div style="flex:none;padding:22px 28px 0">
    <div onClick="{{ seek }}" style="position:relative;height:14px;display:flex;align-items:center;cursor:pointer">
      <div style="position:absolute;left:0;right:0;height:4px;border-radius:3px;background:rgba(241,235,221,.16)"></div>
      <div style="position:absolute;left:0;height:4px;border-radius:3px;background:#C8941F;width:{{ progressPct }}"></div>
      <div style="position:absolute;left:{{ progressPct }};width:14px;height:14px;border-radius:50%;background:#F4EFE2;transform:translateX(-7px);box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:9px;font-size:11.5px;color:#9BA699;font-variant-numeric:tabular-nums">
      <span>{{ curTime }}</span>
      <span>{{ remainTime }}</span>
    </div>
  </div>

  <!-- transport -->
  <div style="flex:none;padding:14px 26px 0;display:flex;align-items:center;justify-content:space-between">
    <div onClick="{{ cycleSpeed }}" style="width:46px;text-align:center;font-size:13px;font-weight:600;color:#C8941F;cursor:pointer">{{ speedLabel }}</div>
    <div onClick="{{ back15 }}" style="cursor:pointer;color:#EDE7D8;display:flex;align-items:center;justify-content:center"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9l5 4"/><path d="M6 9h8a5 5 0 0 1 0 10H9"/><text x="11.5" y="22" font-size="7" fill="currentColor" stroke="none" font-family="IBM Plex Sans" font-weight="600">15</text></svg></div>
    <div onClick="{{ togglePlay }}" style="width:72px;height:72px;border-radius:50%;background:#C8941F;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 12px 26px -8px rgba(200,148,31,.6)">
      <sc-if value="{{ playing }}" hint-placeholder-val="{{ false }}"><svg width="22" height="24" viewBox="0 0 22 24" fill="#241F16"><rect x="2" y="0" width="6" height="24" rx="1.5"/><rect x="14" y="0" width="6" height="24" rx="1.5"/></svg></sc-if>
      <sc-if value="{{ paused }}" hint-placeholder-val="{{ true }}"><svg width="22" height="26" viewBox="0 0 22 26"><path d="M3 1l17 12L3 25z" fill="#241F16"/></svg></sc-if>
    </div>
    <div onClick="{{ fwd30 }}" style="cursor:pointer;color:#EDE7D8;display:flex;align-items:center;justify-content:center"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13 5l5 4-5 4"/><path d="M18 9h-8a5 5 0 0 0 0 10h5"/><text x="6.5" y="22" font-size="7" fill="currentColor" stroke="none" font-family="IBM Plex Sans" font-weight="600">30</text></svg></div>
    <div onClick="{{ toggleSleep }}" style="width:46px;display:flex;justify-content:center;cursor:pointer;color:{{ sleepColor }}"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.3 6.3 0 0 0 10.5 10.5z"/></svg></div>
  </div>

  <!-- clip / actions -->
  <div style="flex:1;display:flex;align-items:flex-end;padding:0 18px 30px">
    <div style="width:100%;background:rgba(241,235,221,.06);border:1px solid rgba(241,235,221,.1);border-radius:18px;padding:6px">
      <div style="display:flex">
        <div onClick="{{ toggleClip }}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;border-radius:13px;cursor:pointer;background:{{ clipBg }}">
          <span style="width:21px;height:21px;background:{{ clipFg }};-webkit-mask:url('assets/icons/notebook.svg') center/contain no-repeat;mask:url('assets/icons/notebook.svg') center/contain no-repeat"></span>
          <span style="font-size:11px;font-weight:600;color:{{ clipFg }};white-space:nowrap">{{ clipLabel }}</span>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;cursor:pointer">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#C7CEC2" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M4 10h16M4 15h10M4 20h7"/></svg>
          <span style="font-size:11px;font-weight:600;color:#C7CEC2">Transcript</span>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;cursor:pointer">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#C7CEC2" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="M8.3 10.7l7.4-4.3M8.3 13.3l7.4 4.3"/></svg>
          <span style="font-size:11px;font-weight:600;color:#C7CEC2">Share</span>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;cursor:pointer">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#C7CEC2" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M5 18.5h14"/></svg>
          <span style="font-size:11px;font-weight:600;color:#C7CEC2">Download</span>
        </div>
      </div>
    </div>
  </div>

</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { playing: true, pos: 1334, speedIdx: 0, liked: false, clipped: false, sleep: false };
  total = 3471;
  speeds = [1, 1.25, 1.5, 1.75, 2];

  componentDidMount() {
    this._t = setInterval(() => {
      if (this.state.playing) this.setState(s => ({ pos: Math.min(this.total, s.pos + this.speeds[s.speedIdx]) }));
    }, 1000);
  }
  componentWillUnmount() { clearInterval(this._t); }
  fmt(s) { s = Math.max(0, Math.floor(s)); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }

  renderVals() {
    const sp = this.speeds[this.state.speedIdx];
    return {
      playing: this.state.playing, paused: !this.state.playing,
      liked: this.state.liked, notLiked: !this.state.liked,
      togglePlay: () => this.setState(s => ({ playing: !s.playing })),
      toggleLike: () => this.setState(s => ({ liked: !s.liked })),
      toggleSleep: () => this.setState(s => ({ sleep: !s.sleep })),
      sleepColor: this.state.sleep ? '#C8941F' : '#9BA699',
      back15: () => this.setState(s => ({ pos: Math.max(0, s.pos - 15) })),
      fwd30: () => this.setState(s => ({ pos: Math.min(this.total, s.pos + 30) })),
      cycleSpeed: () => this.setState(s => ({ speedIdx: (s.speedIdx + 1) % this.speeds.length })),
      speedLabel: sp.toFixed(2).replace(/0$/, '').replace(/\.$/, '.0') + '\u00D7',
      curTime: this.fmt(this.state.pos),
      remainTime: '-' + this.fmt(this.total - this.state.pos),
      progressPct: (this.state.pos / this.total * 100).toFixed(2) + '%',
      seek: (e) => {
        const r = e.currentTarget.getBoundingClientRect();
        const f = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
        this.setState({ pos: Math.round(f * this.total) });
      },
      toggleClip: () => this.setState(s => ({ clipped: !s.clipped })),
      clipped: this.state.clipped,
      clipBg: this.state.clipped ? 'rgba(200,148,31,.16)' : 'transparent',
      clipFg: this.state.clipped ? '#E0A93A' : '#C7CEC2',
      clipLabel: this.state.clipped ? 'Saved ' + this.fmt(this.state.pos) : 'Clip moment',
    };
  }
}
</script>
</body>
</html>
