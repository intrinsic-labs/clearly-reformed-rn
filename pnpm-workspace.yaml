# unrs-resolver (via eslint-import-resolver-typescript) ships prebuilt napi binaries;
# its native build step is unnecessary, so we decline it. This also silences pnpm's
# "ignored build scripts" prompt.
allowBuilds:
  unrs-resolver: false

minimumReleaseAgeExclude:
  - expo-notifications@56.0.20

# expo-notifications 56.0.20 → @expo/image-utils@0.10.2 asks for @expo/require-utils@^56.1.4,
# which upstream only published as a canary (stable latest is 56.1.3). Pin the stable release
# until Expo publishes a non-canary 56.1.4.
overrides:
  "@expo/image-utils>@expo/require-utils": 56.1.3
  "@expo/env@~2.3.1": 2.3.0

patchedDependencies:
  '@javascriptcommon/react-native-track-player': patches/@javascriptcommon__react-native-track-player.patch
